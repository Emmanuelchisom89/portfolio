<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emmanuel Chisom | Software Engineer</title>
  <meta name="description"
    content="Software Engineer building modern, scalable web applications with React, Next.js and Tailwind." />

  <script>
    (function () {
      const saved = localStorage.getItem("darkMode");

      if (saved === "true") {
        document.documentElement.classList.add("dark");
      } else if (saved === "false") {
        document.documentElement.classList.remove("dark");
      } else {
        // first visit → system preference
        if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
          document.documentElement.classList.add("dark");
        }
      }

      // 👇 prevent transition flash on load
      document.documentElement.classList.add("no-transition");
    })();
  </script>
</head>

<body>
  <div id="root" class="px-1 md:px-8 py-8"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
